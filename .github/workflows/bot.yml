# ============================================================
# Vera Open — Bot Telegram (batch a cada 30 min)
# ============================================================
# Processa comandos Telegram pendentes (/status /check /feito /ceu).
# Roda a cada 30 min para dar resposta rapida mesmo nos dias sem
# research/briefing. Commits state/bot_state.json automaticamente.
# ============================================================

name: Bot

on:
  schedule:
    - cron: "*/30 * * * *"  # A cada 30 min
  workflow_dispatch:

concurrency:
  group: vera-bot
  cancel-in-progress: false

env:
  VERA_CONFIG: config/config.ci.yaml
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  NOTION_DB_ACOES: ${{ secrets.NOTION_DB_ACOES }}
  NOTION_DB_CHECK: ${{ secrets.NOTION_DB_CHECK }}
  NOTION_DB_PIPELINE: ${{ secrets.NOTION_DB_PIPELINE }}
  NOTION_DB_LINHA_CEU: ${{ secrets.NOTION_DB_LINHA_CEU }}
  NOTION_PAGE_NATAL: ${{ secrets.NOTION_PAGE_NATAL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra personal

      - name: Process pending Telegram commands
        run: uv run python -m vera bot

      - name: Commit bot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/bot_state.json state/bot_pending.json || true
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
