# ============================================================
# Vera Open — Research (dia sim, dia nao)
# ============================================================
# Roda todos os research packs a cada 2 dias as 10h BRT (13h UTC).
# Na virada de mes pode haver 1 dia de lacuna em vez de 2 — ok.
# Tambem pode ser disparado manualmente via workflow_dispatch.
# ============================================================

name: Research

on:
  schedule:
    # 13:00 UTC = 10:00 BRT, dias impares do mes (1, 3, 5, ..., 29, 31)
    - cron: "0 13 */2 * *"
  workflow_dispatch:

concurrency:
  group: vera-research
  cancel-in-progress: false

env:
  VERA_CONFIG: config/config.ci.yaml
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  NOTION_DB_ACOES: ${{ secrets.NOTION_DB_ACOES }}
  NOTION_DB_PIPELINE: ${{ secrets.NOTION_DB_PIPELINE }}
  NOTION_DB_CONTATOS: ${{ secrets.NOTION_DB_CONTATOS }}
  NOTION_DB_CHECK: ${{ secrets.NOTION_DB_CHECK }}
  NOTION_DB_LINHA_CEU: ${{ secrets.NOTION_DB_LINHA_CEU }}
  NOTION_DB_METRICAS: ${{ secrets.NOTION_DB_METRICAS }}
  NOTION_DB_PARALELOS: ${{ secrets.NOTION_DB_PARALELOS }}
  NOTION_PAGE_NATAL: ${{ secrets.NOTION_PAGE_NATAL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Research — All packs
        run: uv run python -m vera research --all --force 2>&1 || true
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/ || true
          git diff --cached --quiet || git commit -m "chore: update research state [skip ci]"
          git push
