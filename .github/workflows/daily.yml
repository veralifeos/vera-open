# ============================================================
# Vera Open — Daily Research + Briefing
# ============================================================
# Runs every day at 9:00 AM BRT (12:00 UTC).
# Also triggerable manually via workflow_dispatch.
# ============================================================

name: Daily Briefing

on:
  schedule:
    # 12:00 UTC = 09:00 BRT (UTC-3)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignorar janela de horário e idempotência"
        required: false
        default: "false"

env:
  VERA_CONFIG: config/config.ci.yaml
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  research-and-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Research — All packs
        run: uv run python -m vera research --all --force 2>&1 || true
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Run briefing
        run: |
          uv run python -m vera briefing ${{ github.event.inputs.force_run == 'true' && '--force' || '' }}

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/ || true
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
