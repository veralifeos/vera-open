# ============================================================
# Vera Open — Daily Briefing
# ============================================================
# Runs every day at 9:00 AM BRT (12:00 UTC).
# Research foi movido para research.yml (dia sim/dia nao).
# ============================================================

name: Daily Briefing

on:
  schedule:
    # 12:00 UTC = 09:00 BRT (UTC-3)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignorar janela de horário e idempotência"
        required: false
        default: "false"

concurrency:
  group: vera-daily
  cancel-in-progress: false

env:
  VERA_CONFIG: config/config.ci.yaml
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  NOTION_DB_ACOES: ${{ secrets.NOTION_DB_ACOES }}
  NOTION_DB_PIPELINE: ${{ secrets.NOTION_DB_PIPELINE }}
  NOTION_DB_CONTATOS: ${{ secrets.NOTION_DB_CONTATOS }}
  NOTION_DB_CHECK: ${{ secrets.NOTION_DB_CHECK }}
  NOTION_DB_LINHA_CEU: ${{ secrets.NOTION_DB_LINHA_CEU }}
  NOTION_DB_METRICAS: ${{ secrets.NOTION_DB_METRICAS }}
  NOTION_DB_PARALELOS: ${{ secrets.NOTION_DB_PARALELOS }}
  NOTION_PAGE_NATAL: ${{ secrets.NOTION_PAGE_NATAL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
  GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}

jobs:
  research-and-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra calendar --extra personal

      - name: Run briefing
        run: |
          uv run python -m vera briefing ${{ github.event.inputs.force_run == 'true' && '--force' || '' }}

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state/ || true
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
