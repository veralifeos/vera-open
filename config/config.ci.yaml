# CI config — used by GitHub Actions workflows.
# Database IDs are public (useless without NOTION_TOKEN).
# All secrets come from GitHub Actions secrets / env vars.

name: "Vera"
language: "pt-BR"
timezone: "America/Sao_Paulo"
backend:
  type: "notion"
  notion:
    token_env: "NOTION_TOKEN"
llm:
  default: "claude"
  advanced: "claude"
  providers:
    claude:
      model: "claude-sonnet-4-5-20250929"
      api_key_env: "ANTHROPIC_API_KEY"
delivery:
  telegram:
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"
integrations:
  google_calendar:
    enabled: false
schedule:
  briefing: "09:00"
  urgency_update: "08:00"
  weekly_review:
    day: "saturday"
    time: "10:00"
  week_setup:
    day: "sunday"
    time: "18:00"
persona:
  preset: "executive"
  custom_prompt_file: null
domains:
  tasks:
    enabled: true
    collection: "59c4e7b82ebb4db5b7a5ab6ef91e686f"
    fields:
      title: "Nome"
      status: "Status"
      priority: "Prioridade"
      deadline: "Deadline"
      category: "Tipo"
      status_active: ["A Fazer", "Fazendo", "Aguardando"]
      status_done: ["Concluído", "Arquivado"]
  pipeline:
    enabled: true
    collection: "f53f490c5ebe416482106d4bd1f3e108"
    fields:
      title: "Nome"
      stage: "Estágio"
      priority: "Prioridade"
      next_action: "Próximo Passo"
      last_contact: "Data Último Contato"
  contacts:
    enabled: true
    collection: "498dff6eaa58422da1a3d471a4bb60e6"
    fields:
      name: "Nome"
      status: "Status"
      type: "Tipo"
      last_interaction: "Última Interação"
debug:
  dry_run: false
  verbose: false
