# ============================================================================
# Vera Open Configuration
# Copy to config.yaml and fill in your values, or run: python -m vera setup
# ============================================================================

# --- Identity ---
name: "Vera"
language: "pt-BR"
timezone: "America/Sao_Paulo"

# --- Storage Backend ---
# Where your data lives. Only 'notion' supported in v0.1.
backend:
  type: "notion"
  notion:
    # Create an integration at https://www.notion.so/my-integrations
    # Then share each database with the integration
    token_env: "NOTION_TOKEN"

# --- LLM Provider ---
# Which AI generates briefings. 'claude' or 'ollama'.
llm:
  default: "claude"
  advanced: "claude"           # For complex analysis (future)
  providers:
    claude:
      model: "claude-sonnet-4-5-20250929"
      api_key_env: "ANTHROPIC_API_KEY"
    ollama:
      model: "llama3.2:3b"
      base_url: "http://localhost:11434"
    # openai:                  # Not yet implemented
    #   model: "gpt-4o"
    #   api_key_env: "OPENAI_API_KEY"

# --- Delivery ---
# How briefings reach you.
delivery:
  telegram:
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

# --- Integrations (all optional) ---
integrations:
  google_calendar:
    enabled: false
    credentials_env: "GOOGLE_CREDENTIALS"
    # oauth_token_env: "GOOGLE_OAUTH_TOKEN"
    calendar_ids: ["primary"]

# --- Schedule ---
# When to run. Used by time window guard (3h before, 2h after).
schedule:
  briefing: "09:00"
  urgency_update: "08:00"
  weekly_review:
    day: "saturday"
    time: "10:00"
  week_setup:
    day: "sunday"
    time: "18:00"

# --- Persona ---
# How Vera communicates. Presets: 'executive', 'coach', 'custom'.
# 'custom' uses workspace/AGENT.md instead of built-in prompts.
persona:
  preset: "executive"
  custom_prompt_file: null     # Path to AGENT.md if preset=custom

# --- Life Domains ---
# Each domain is optional except tasks. Set 'enabled: true' and fill
# 'collection' with your Notion database ID. The 'fields' map your
# column names to Vera's internal model.
domains:
  tasks:
    enabled: true
    collection: ""             # Required. Your Tasks database ID
    fields:
      title: "Nome"            # Title property name in your Notion DB
      status: "Status"
      priority: "Prioridade"
      deadline: "Deadline"
      category: "Tipo"
      # status_filter_type: Notion property type for status filter.
      # Use "select" (default) for standard select fields,
      # or "status" if your DB uses Notion's built-in Status type.
      status_active: ["A Fazer", "Fazendo", "Aguardando"]
      status_done: ["Concluído", "Arquivado"]

  pipeline:
    enabled: false
    collection: ""
    fields:
      title: "Nome"
      stage: "Estágio"
      priority: "Prioridade"
      next_action: "Próximo Passo"
      last_contact: "Data Último Contato"

  contacts:
    enabled: false
    collection: ""
    fields:
      name: "Nome"
      status: "Status"
      type: "Tipo"
      last_interaction: "Última Interação"

  check_semanal:
    enabled: false
    collection: ""             # Your Check Semanal database ID
    fields:
      semana: "Semana"         # Title field, ex: "S11 (10-16 mar)"
      energia: "Energia"       # Number 0-10
      vida_pratica: "Vida Pratica"  # Number 0-10
      carreira: "Carreira"     # Number 0-10
      sanidade: "Sanidade"     # Number 0-10
      highlight: "Highlight"   # Rich text

  # Future domains (not yet implemented):
  # health:
  #   enabled: false
  #   collection: ""
  # finances:
  #   enabled: false
  #   collection: ""
  # learning:
  #   enabled: false
  #   collection: ""

# --- Debug ---
debug:
  dry_run: false               # Run without sending Telegram or saving state
  verbose: false               # Extra logging
